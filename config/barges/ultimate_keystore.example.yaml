# Ultimate Keystore — kernel *data-replication* barge for product services.
#
# Products keep local keystores; this barge is a replication peer via
# /kernel/keystore (KERNEL_KEYSTORE_URL / ULTIMATE_KEYSTORE_URL) — not a
# prefer-remote replacement for product-local material.
#
# Standalone:
#   tunneltug -mode ultimate_keystore -uks-data ./data/ultimate_keystore -token "$TOKEN"

name: ultimate_keystore
replicas: 1
# port: 8481

node_id: ultimate-keystore

env:
  UKS_DATA: /data
