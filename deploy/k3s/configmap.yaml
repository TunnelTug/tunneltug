apiVersion: v1
kind: ConfigMap
metadata:
  name: tunneltug-barge-config
  namespace: tunneltug
  labels:
    app.kubernetes.io/name: tunneltug-barge
    app.kubernetes.io/component: barge
data:
  # Prefer a Kubernetes Secret for the token in production.
  # Mint with: tunneltug -gen-token  (crypto/rand, 256-bit hex). Never use weak defaults.
  token: "replace-with-cryptographic-token"
  domain: "tunneltug.com"
  lb: "165.22.14.101:8444"
  fleet_id: "tunneltug"
  control_base: "9001"
  public_base: "8445"
  port_step: "1"
  logic_namespace: "default"
