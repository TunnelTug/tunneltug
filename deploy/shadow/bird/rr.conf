# Route reflector — AS 65000 iBGP.

log stderr all;
router id 203.0.113.1;

protocol device { scan time 10; }
protocol direct { ipv4; interface "lo"; }
protocol kernel { ipv4 { export all; }; }

protocol bgp edge1 {
    local 203.0.113.1 as 65000;
    neighbor 203.0.113.53 as 65000;
    rr client;
    ipv4 { import all; export all; next hop self; };
}

protocol bgp resolver1 {
    local 203.0.113.1 as 65000;
    neighbor 203.0.113.10 as 65000;
    rr client;
    ipv4 { import all; export all; next hop self; };
}
