# Edge speaker; tunneltug bird backend rewrites anycast-routes.conf.

log stderr all;
router id 203.0.113.53;

protocol device { scan time 10; }
protocol kernel { ipv4 { export all; }; }

protocol static anycast4 {
    ipv4;
    include "anycast-routes.conf";
}

protocol bgp rr {
    local 203.0.113.53 as 65000;
    neighbor 203.0.113.1 as 65000;
    ipv4 {
        import none;
        export where source = RTS_STATIC;
        next hop self;
    };
}
